name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish"
        type: choice
        options:
          - next
          - latest
        default: next
      dry_run:
        description: "Run npm publish with --dry-run"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  PACKAGE_DIR: packages/eslint-plugin-suitescript-compat
  WORKSPACE: eslint-plugin-suitescript-compat

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify release package
        shell: bash
        run: |
          package_version="$(node -p "require('./${PACKAGE_DIR}/package.json').version")"
          is_private="$(node -p "require('./${PACKAGE_DIR}/package.json').private === true")"

          if [ "$is_private" = "true" ]; then
            echo "::error::Package is marked private and cannot be published."
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            expected_tag="v${package_version}"
            if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
              echo "::error::Git tag ${GITHUB_REF_NAME} does not match package version ${package_version}. Expected ${expected_tag}."
              exit 1
            fi
          fi

          if [[ "$package_version" == *-* ]]; then
            echo "NPM_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Use manual npm dist-tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "NPM_TAG=${{ inputs.npm_tag }}" >> "$GITHUB_ENV"

      - name: Check package contents
        run: npm pack --dry-run --workspace "$WORKSPACE"

      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --workspace "$WORKSPACE" --tag "$NPM_TAG" --dry-run

      - name: Publish
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        run: npm publish --workspace "$WORKSPACE" --tag "$NPM_TAG"
