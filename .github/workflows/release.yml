# Automatically creates a release when a PR is merged to main.
#
# Version increment is inferred from conventional commit messages since the last tag:
#   - "BREAKING CHANGE" or "!" before ":" -> major
#   - "feat:" prefix -> minor
#   - Everything else -> patch
#
# PREREQUISITES
#
# A deploy key with write access is required so this workflow can push the
# version bump commit and tag to the default branch over SSH.
#
# 1. Generate an SSH keypair dedicated to release automation
# 2. Add the public key as a repository deploy key with write access enabled
# 3. Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    Name: RELEASE_DEPLOY_KEY   Value: <private key>
# 4. (Optional) Add RELEASE_DEPLOY_KNOWN_HOSTS with ssh-keyscan output for hosts
#    you require beyond GitHub.com.
#
# If your default branch has PR-only rules, allow the Deploy Key actor as a
# bypass actor in the branch ruleset, or this workflow's push/tag step fails.

name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  PACKAGE_DIR: packages/eslint-plugin-suitescript-compat
  WORKSPACE: eslint-plugin-suitescript-compat

jobs:
  release:
    name: Auto-release on merge
    runs-on: ubuntu-latest

    if: "!startsWith(github.event.head_commit.message, 'Release ')"

    steps:
      - name: Validate release deploy key
        env:
          RELEASE_DEPLOY_KEY: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          if [ -z "$RELEASE_DEPLOY_KEY" ]; then
            echo "Error: RELEASE_DEPLOY_KEY is not set."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
          ssh-known-hosts: ${{ secrets.RELEASE_DEPLOY_KNOWN_HOSTS }}
          ssh-strict: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate package version against latest tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            exit 0
          fi

          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./${PACKAGE_DIR}/package.json', 'utf8')).version")
          TAG_VERSION="${LAST_TAG#v}"

          node scripts/release-versioning.mjs assert-not-behind "$PACKAGE_VERSION" "$TAG_VERSION"

      - name: Determine version increment
        id: increment
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b")
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LAST_TAG}..HEAD")
          fi

          INCREMENT=$(printf "%s" "$COMMITS" | node scripts/release-versioning.mjs increment)
          echo "increment=$INCREMENT" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Bump package version
        id: version
        run: |
          npm version "${{ steps.increment.outputs.increment }}" --workspace "$WORKSPACE" --no-git-tag-version
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./${PACKAGE_DIR}/package.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag release
        run: |
          git add "$PACKAGE_DIR/package.json" package-lock.json
          git commit -m "Release ${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.version }}" --verify-tag --generate-notes --title "v${{ steps.version.outputs.version }}"
